{% extends "base.html" %}

{%block content%}
<section class="hero hero-home">

	<div>
		<h1>John Doe's Blog</h1>
		<p class="h3">a collection of random musings</p>
	</div>

</section>

<section class="container py-5">

	<div class="row g-4">

		<!-- Post -->
		{% for post in posts %}
			<div class="col-md-3">

			<div class="card h-100">

				<img src="https://picsum.photos/400/200?random={{ post.id }}" class="card-img-top">

					<div class="card-body d-flex flex-column">

						<h5 class="card-title">{{ post.title }}</h5>

						<p class="card-text">{{ post.subtitle }}</p>

						<a href="#" class="btn btn-primary mt-auto">Read More</a>

					</div>

			</div>

		</div>
		{% endfor %}

	</div>

	<!-- Older Posts Button -->

	<div class="text-center mt-5">

		<a href="posts.html" class="btn btn-outline-dark btn-lg">Older Posts</a>
		
	</div>

</section>


{%endblock%}
