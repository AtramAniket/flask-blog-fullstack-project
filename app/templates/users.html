{% extends "base.html" %}

{% block title %}Users - Admin{% endblock %}

{% block content %}
<h1 class="mb-4">Registered Users</h1>

<table class="table table-striped table-bordered">
  <thead class="table-dark">
    <tr>
      <th>Username</th>
      <th>Email</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for user in users %}
    <tr>
      <td>{{ user.username }}</td>
      <td>{{ user.email }}</td>
      <td>
        <form method="post" action="{{ url_for('users.delete_user', user_id=user.id) }}" onsubmit="return confirm('Are you sure you want to delete this user?');">
          <button class="btn btn-sm btn-danger" type="submit">Delete</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
